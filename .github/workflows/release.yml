name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run platform regression tests
        run: python -m unittest discover -s tests -v

      - name: Build executable
        shell: pwsh
        run: |
          $iconArgs = @()
          if (Test-Path "assets/ExifCopyTool.ico") {
            $iconArgs = @("--icon", "assets/ExifCopyTool.ico", "--add-data", "assets/ExifCopyTool.ico;assets")
          }
          python -m PyInstaller --noconsole --onedir --clean --noupx --name ExifCopyTool @iconArgs exif_context_app.py

      - name: Package portable app
        shell: pwsh
        run: |
          Compress-Archive -Path dist/ExifCopyTool -DestinationPath dist/ExifCopyTool.zip -Force

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force installer | Out-Null
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" packaging/windows/ExifCopyTool.iss

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: |
            dist/ExifCopyTool.zip
            installer/ExifCopyToolSetup.exe
          if-no-files-found: error

  build-macos:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r packaging/macos/requirements.txt

      - name: Run platform regression tests
        run: python -m unittest discover -s tests -v

      - name: Validate macOS resources
        run: |
          test "$(uname -m)" = "arm64"
          python -c 'import tkinter; assert tkinter.TkVersion >= 8.6'
          xcrun swiftc -target arm64-apple-macos13.0 -module-cache-path /tmp/exif-copy-swift-module-cache -framework AppKit packaging/macos/ExifCopyService.swift -o /tmp/ExifCopyService

      - name: Build macOS app and DMG
        run: ./packaging/macos/build_macos.sh

      - name: Verify DMG
        run: |
          file dist/ExifCopyTool.app/Contents/MacOS/ExifCopyTool | grep -q arm64
          file dist/ExifCopyTool.app/Contents/Frameworks/packaging/macos/ExifCopyService | grep -q arm64
          codesign --verify --deep --strict --verbose=2 dist/ExifCopyTool.app
          hdiutil verify dist/ExifCopyTool-macOS.dmg

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: dist/ExifCopyTool-macOS.dmg
          if-no-files-found: error

  publish-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/dist/ExifCopyTool.zip
            release-assets/installer/ExifCopyToolSetup.exe
            release-assets/ExifCopyTool-macOS.dmg
          fail_on_unmatched_files: true
