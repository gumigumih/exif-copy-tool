name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build executable
        shell: pwsh
        run: |
          $iconArgs = @()
          if (Test-Path "assets/ExifCopyTool.ico") {
            $iconArgs = @("--icon", "assets/ExifCopyTool.ico")
          }
          python -m PyInstaller --noconsole --onefile --name ExifCopyTool @iconArgs exif_context_app.py

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force installer | Out-Null
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" ExifCopyTool.iss

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/ExifCopyTool.exe
            installer/ExifCopyToolSetup.exe
