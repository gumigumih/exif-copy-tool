name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run platform regression tests
        run: python -m unittest discover -s tests -v

      - name: Build executable
        shell: pwsh
        run: |
          $iconArgs = @()
          if (Test-Path "assets/ExifCopyTool.ico") {
            $iconArgs = @("--icon", "assets/ExifCopyTool.ico", "--add-data", "assets/ExifCopyTool.ico;assets")
          }
          python -m PyInstaller --noconsole --onedir --clean --noupx --name ExifCopyTool @iconArgs exif_context_app.py

      - name: Package portable app
        shell: pwsh
        run: |
          Compress-Archive -Path dist/ExifCopyTool -DestinationPath dist/ExifCopyTool.zip -Force

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force installer | Out-Null
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" packaging/windows/ExifCopyTool.iss

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/ExifCopyTool.zip
            installer/ExifCopyToolSetup.exe

  build-macos:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r packaging/macos/requirements.txt

      - name: Run platform regression tests
        run: python -m unittest discover -s tests -v

      - name: Validate macOS resources
        run: |
          python -c 'import tkinter; assert tkinter.TkVersion >= 8.6'
          xcrun swiftc -module-cache-path /tmp/exif-copy-swift-module-cache -framework AppKit packaging/macos/ExifCopyService.swift -o /tmp/ExifCopyService

      - name: Build macOS app and DMG
        run: ./packaging/macos/build_macos.sh

      - name: Verify DMG
        run: hdiutil verify dist/ExifCopyTool-macOS.dmg

      - name: Upload macOS release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ExifCopyTool-macOS.dmg
